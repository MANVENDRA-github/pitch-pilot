name: docs

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# gh-deploy pushes the built site to the gh-pages branch.
permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    env:
      # Silence an unsolicited third-party promo banner printed during the build.
      DISABLE_MKDOCS_2_WARNING: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: mkdocs gh-deploy --force
